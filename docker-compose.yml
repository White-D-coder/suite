version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: suite-postgres-dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: suite
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: suite-redis-dev
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata-dev:
